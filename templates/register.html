{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 mt-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">สมัครสมาชิก ✨</h1>
  <form id="registerForm" class="space-y-4">
    <div>
      <label class="text-sm text-slate-600">Username</label>
      <input name="username" required minlength="3" class="w-full mt-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
      <label class="text-sm text-slate-600">Email</label>
      <input name="email" type="email" required class="w-full mt-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
      <label class="text-sm text-slate-600">Password</label>
      <input name="password" type="password" required minlength="6" class="w-full mt-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
    </div>
    <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg font-medium shadow">สมัครสมาชิก</button>
    <div id="err" class="text-sm text-red-600 hidden"></div>
  </form>
  <p class="text-center text-sm text-slate-500 mt-4">มีบัญชีแล้ว? <a href="/login" class="text-indigo-600 hover:underline">เข้าสู่ระบบ</a></p>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = {username: fd.get('username'), email: fd.get('email'), password: fd.get('password')};
  const res = await fetch('/api/v1/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) {
    const el = document.getElementById('err');
    el.textContent = data.detail || 'สมัครไม่สำเร็จ';
    el.classList.remove('hidden');
    return;
  }
  document.cookie = `access_token=${data.access_token}; path=/; max-age=3600; SameSite=Lax`;
  localStorage.setItem('token', data.access_token);
  window.location = '/dashboard';
});
</script>
{% endblock %}
